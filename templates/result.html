<!doctype html>
<html>
<head>
    <title>AI文档助手 - 结果对比</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f7f8fa;
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
        }
        h1, h3 {
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .columns {
            display: flex;
            gap: 20px;
        }
        .column {
            flex: 1;
        }
        .left, .right {
            border: 1px solid #e6e6e6;
            border-radius: 10px;
            padding: 15px;
            background-color: #fefefe;
            flex: 1;
            width: auto;
            display: flex;
            flex-direction: column;
        }
        .scrollable {
            max-height: 600px; /* or desired height */
            overflow-y: auto;
        }
        .card {
            margin-bottom: 15px;
            padding: 12px;
            background-color: #f4f6f8;
            border-radius: 8px;
        }
        pre {
            background-color: #f5f5f5;
            padding: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            border-radius: 6px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
            font-size: 14px;
            line-height: 1.6;
        }
        th, td {
            border: 1px solid #e6e6e6;
            padding: 10px;
            vertical-align: top;
        }
        th { background-color: #fafafa; }
        button {
            padding: 8px 14px;
            font-size: 14px;
            border-radius: 6px;
            border: none;
            background-color: #4a90e2;
            color: white;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover { background-color: #3b7dc4; }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="window.history.back()">返回</button>
        <h1>AI文档助手结果对比</h1>
        <div class="columns">
            <!-- 左侧：AI结果 -->
            <div class="column">
                <h3>经过AI改写过的问题</h3>
                <div class="left">
                    <div class="scrollable">
                        <div class="section">
                            <pre id="rewrite">{{ rewritten_query }}</pre>
                        </div>
                        <div class="section">
                            <h3>生成的答案</h3>
                            <pre id="answer">{{ answer }}</pre>
                        </div>
                        <div class="section">
                            <h3>检索到的片段</h3>
                            <div id="chunks">
                                {% for chunk in chunks %}
                                <div class="card">
                                    <div style="font-weight:bold;">
                                        Module: {{ chunk.module or 'N/A' }} | Score: {{ chunk.score or 'N/A' }}
                                    </div>
                                    <div style="margin-top:5px; white-space: pre-wrap;">{{ chunk.content or '' }}</div>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 右侧：原始文档 -->
            <div class="column">
                <h3>原始文档内容</h3>
                <div class="right">
                    <div class="scrollable">
                        <div class="section">
                            <div id="documentContent">{{ document_content }}</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 如果要渲染Markdown文档，可用marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const docContentEl = document.getElementById("documentContent");
        // 假设 document_content 是 Markdown 文本
        docContentEl.innerHTML = marked.parse(docContentEl.textContent || "");
    </script>
</body>
</html>
